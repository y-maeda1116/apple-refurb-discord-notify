name: Monitor Apple Refurbished Mac mini

on:
  schedule:
    - cron: '*/15 22,23,0-14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-go:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go_version/go.mod

      - name: Build Go binary
        working-directory: ./go_version
        run: go build -o monitor main.go

      - name: Run Go monitor
        working-directory: ./go_version
        run: ./monitor

      - name: Commit inventory changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet inventory.json || \
          (git add inventory.json && \
           git commit -m "chore: update inventory [skip ci]" && \
           git push)

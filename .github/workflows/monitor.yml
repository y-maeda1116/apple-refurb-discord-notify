name: Monitor Apple Refurbished Mac mini

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-go:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go_version/go.mod

      - name: Build Go binary
        working-directory: ./go_version
        run: go build -o monitor main.go

      - name: Run Go monitor (Timed)
        working-directory: ./go_version
        run: time ./monitor # バイナリを直接実行し、時間を計測

      - name: Commit inventory changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet inventory.json || \
          (git add inventory.json && \
           git commit -m "chore: update inventory (go) [skip ci]" && \
           git push)

  monitor-python:
    runs-on: ubuntu-latest
    # needs: monitor-go  <-- もしこれがあれば削除することで並列化されます
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: python_version/requirements.txt

      - name: Install dependencies
        working-directory: ./python_version
        run: pip install -r requirements.txt

      - name: Run Python monitor (Timed)
        working-directory: ./python_version/src
        run: time python monitor.py

      # Python側でも在庫更新をする場合は必要（競合注意）
      - name: Commit inventory changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet inventory.json || \
          (git add inventory.json && \
           git commit -m "chore: update inventory (python) [skip ci]" && \
           git push)

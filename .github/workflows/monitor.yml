name: Monitor Apple Refurbished Mac mini

on:
  schedule:
    # Every 15 minutes (UTC)
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-go:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go_version/go.mod

      - name: Run Go monitor
        working-directory: ./go_version
        run: go run main.go

      - name: Commit inventory changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet inventory.json || \
          (git add inventory.json && \
           git commit -m "chore: update inventory [skip ci]" && \
           git push)

  monitor-python:
    runs-on: ubuntu-latest
    needs: monitor-go  # Run after Go version
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./python_version
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python monitor
        working-directory: ./python_version
        run: python src/monitor.py

      - name: Commit inventory changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet inventory.json || \
          (git add inventory.json && \
           git commit -m "chore: update inventory [skip ci]" && \
           git push)
